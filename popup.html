<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mailtropy</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <main class="app">
      <h1>Mailtropy</h1>
      <p class="subtitle">Privacy-first Gmail metadata insights</p>

      <button id="analyzeBtn" class="primary-btn" type="button">Analyze Inbox</button>
      <p id="status" class="status" aria-live="polite"></p>

      <section id="dataScopeBanner" class="data-scope-banner" aria-label="Data scope summary" hidden>
        <div class="data-scope-left">
          <p id="dataScopeSummary" class="data-scope-title"></p>
          <p class="data-scope-subtitle">Message-level analysis. Conversation view does not affect results.</p>
        </div>
        <div class="data-scope-right">
          <p id="dataScopeLastScan" class="data-scope-last-scan"></p>
        </div>
      </section>

      <section class="results" aria-label="Analytics output">
        <pre id="output">No analysis yet.</pre>
      </section>
    </main>

    <script type="module" src="src/popup.js"></script>
  </body>
</html>
