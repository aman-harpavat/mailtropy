<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mailtropy</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <main class="app">
      <section id="analysisView">
        <h1>Mailtropy</h1>
        <p class="subtitle">Privacy-first Gmail metadata insights</p>

        <button id="analyzeBtn" class="primary-btn" type="button">Analyze Mail Box</button>
        <p id="status" class="status" aria-live="polite"></p>

        <section id="dataScopeBanner" class="data-scope-banner" aria-label="Data scope summary" hidden>
          <div class="data-scope-left">
            <p id="dataScopeSummary" class="data-scope-title"></p>
            <p class="data-scope-subtitle">Gmail groups related messages into conversations, so the count shown may differ from the above total</p>
          </div>
          <div class="data-scope-right">
            <p id="dataScopeLastScan" class="data-scope-last-scan"></p>
          </div>
        </section>

        <div id="analyticsContainer" class="analytics-container" aria-label="Analytics output" hidden>
          <!-- Analytics cards will be inserted here -->
        </div>

        <button id="viewActionsBtn" class="secondary-btn" type="button">View Recommended Actions</button>
      </section>

      <section id="actionsView" hidden>
        <button id="backToAnalysisBtn" class="secondary-btn" type="button">← Back to Analysis</button>
        <p class="actions-note">Note: The provided queries are for sample purposes only. Use them as per your requirement.</p>
        <div id="actionsOutput"></div>
      </section>
    </main>

    <script type="module" src="src/popup.js"></script>
  </body>
</html>
